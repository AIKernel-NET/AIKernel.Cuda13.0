name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Package version to publish
        required: true
        default: 0.0.5
      release_tag:
        description: GitHub release tag
        required: true
        default: v0.0.5
      libtorch_path:
        description: Path to LibTorch 2.12.0 + CUDA 13.0 on the self-hosted Windows runner
        required: true
        default: runtime/win-x64/libtorch

permissions:
  contents: write

jobs:
  publish-cuda-capability:
    name: Publish CUDA capability
    runs-on: [self-hosted, Windows, X64, CUDA13]
    env:
      AIKERNEL_LIBTORCH_PATH: ${{ inputs.libtorch_path }}
      PACKAGE_ID: AIKernel.Cuda13.0.Libtorch2.12.win-x64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Configure native bridge
        run: cmake -S native -B native/build/win-x64 -A x64

      - name: Build native bridge
        run: cmake --build native/build/win-x64 --config Release

      - name: Test managed capability
        run: dotnet test AIKernel.Cuda13.0.Libtorch2.12.win-x64.slnx -c Release --no-restore

      - name: Pack lightweight NuGet package
        run: dotnet pack AIKernel.Cuda13.0.Libtorch2.12.win-x64.slnx -c Release --no-restore -p:Version=${{ inputs.version }}

      - name: Push lightweight NuGet package
        run: dotnet nuget push src/AIKernel.Cuda13.0.Libtorch2.12.win-x64/bin/Release/${{ env.PACKAGE_ID }}.${{ inputs.version }}.nupkg --api-key $env:NUGET_API_KEY --source https://api.nuget.org/v3/index.json --skip-duplicate
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

      - name: Build full runtime archive
        shell: pwsh
        run: |
          $root = "artifacts/runtime/${{ env.PACKAGE_ID }}.${{ inputs.version }}"
          $native = Join-Path $root "runtimes/win-x64/native"
          $runtime = Join-Path $root "runtime/win-x64/libtorch"
          New-Item -ItemType Directory -Force $native | Out-Null
          New-Item -ItemType Directory -Force $runtime | Out-Null
          Copy-Item native/build/win-x64/Release/libtorch_bridge.dll $native
          Copy-Item src/AIKernel.Cuda13.0.Libtorch2.12.win-x64/loader.json $root
          Copy-Item "${{ inputs.libtorch_path }}/*" $runtime -Recurse -Force
          Copy-Item LICENSE $root
          Copy-Item README.md $root
          Copy-Item RELEASE_NOTES.md $root
          Copy-Item LICENSE-THIRD-PARTY $root -Recurse
          Compress-Archive -Path "$root/*" -DestinationPath "artifacts/runtime/${{ env.PACKAGE_ID }}.${{ inputs.version }}.runtime.zip" -Force

      - name: Upload runtime archive to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: artifacts/runtime/${{ env.PACKAGE_ID }}.${{ inputs.version }}.runtime.zip
          body: |
            Full AIKernel CUDA runtime archive for Windows win-x64, CUDA 13.0, and LibTorch 2.12.

            NuGet.org receives the lightweight C# package with the managed assembly,
            libtorch_bridge.dll, loader.json, and dynamic runtime loading logic.

            This GitHub Release asset contains LibTorch/CUDA/cuDNN/cuBLAS runtime
            files and an auto-configured loader.json. Extract the archive beside the
            consuming application or point AIKERNEL_CUDA13_LIBTORCH2_12_WIN_X64_LOADER
            at the extracted loader.json.
